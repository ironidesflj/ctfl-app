name: Deploy to GitHub Pages

# Publica o app no GitHub Pages a cada push na branch principal.
# Para Vercel ou Netlify você NÃO precisa deste arquivo — elas fazem o build do lado delas.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # App na raiz do repo (repos separados): mantenha "."
        # Monorepo (app em subpasta): troque para "./app"
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Monorepo: cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          # Caminho relativo à RAIZ do repo (não ao working-directory).
          # App na raiz: ./dist | Monorepo: ./app/dist
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
